<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special Gift for Nanaa 🫣🩷</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink-tua: #ff1493; 
            --pink-muda: #ff69b4; 
            --bg-pink: linear-gradient(-45deg, #fff5f7 0%, #ffeef2 50%, #fff0f5 100%);
            --glow-pink: 0 0 25px rgba(255, 20, 147, 0.6);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg-pink); 
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            overflow: hidden; height: 100vh; 
            position: relative;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Hearts Romantis */
        .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .heart { 
            position: absolute; font-size: 20px; 
            animation: floatHeart 10s infinite linear; 
            color: var(--pink-muda);
        }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) rotate(90deg) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-50px) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* --- HALAMAN INTRO --- */
        #intro {
            position: fixed; inset: 0; background: rgba(255,245,247,0.98); 
            backdrop-filter: blur(20px); z-index: 2000;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .text-intro {
            font-family: 'Pacifico', cursive; color: var(--pink-tua);
            font-size: clamp(1.8rem, 5vw, 3rem); 
            text-shadow: var(--glow-pink);
            opacity: 0; transform: scale(0.5) rotateY(90deg);
            animation: introSlideIn 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes introSlideIn {
            0% { opacity: 0; transform: scale(0.5) rotateY(90deg); }
            20% { opacity: 1; transform: scale(1.1) rotateY(0deg); }
            50% { transform: scale(1.05); }
            80% { transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1) translateY(-20px); }
        }

        /* --- TOMBOL MULAI ROMANTIS --- */
        #tombol-mulai {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5000; background: linear-gradient(45deg, var(--pink-tua), var(--pink-muda));
            color: white; border: none; padding: 20px 40px; border-radius: 50px;
            font-weight: 700; font-size: 1.4rem; font-family: 'Pacifico', cursive;
            cursor: pointer; box-shadow: var(--glow-pink), 0 15px 35px rgba(255,20,147,0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #tombol-mulai:hover {
            transform: translate(-50%, -50%) scale(1.1) translateY(-10px);
            box-shadow: 0 25px 50px rgba(255,20,147,0.6);
        }

        /* --- KADO ANIMASI 3D --- */
        #container-kado { 
            display: none; text-align: center; z-index: 100; cursor: pointer;
            opacity: 0; transform: scale(0.3) rotateY(180deg);
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #container-kado.muncul { opacity: 1; transform: scale(1) rotateY(0deg); }
        .kado { 
            width: 160px; height: 160px; background: linear-gradient(45deg, var(--pink-muda), white);
            border-radius: 20px; position: relative; margin: 0 auto;
            animation: kadoBounce 2.5s infinite, kadoRotate 10s infinite linear;
            box-shadow: var(--glow-pink), 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .kado:hover { transform: scale(1.1) !important; animation-play-state: paused; }
        .kado::before, .kado::after { 
            content: ''; position: absolute; background: white; border-radius: 10px;
        }
        .kado::before { top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 120px; }
        .kado::after { top: 50%; left: -10px; transform: translateY(-50%); width: 120px; height: 30px; }
        @keyframes kadoBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes kadoRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* --- BALON UPGRADE --- */
        .balon-up { 
            position: fixed; bottom: -120px; font-size: 3.5rem; z-index: 1000; 
            animation: balonNaikSmooth 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            filter: drop-shadow(0 5px 15px rgba(255,105,180,0.5));
        }
        @keyframes balonNaikSmooth {
            0% { transform: translateY(0) scale(0.5) rotate(-180deg); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10vh) scale(0.9) rotate(0deg); }
            100% { transform: translateY(-130vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* --- STORY SLIDES dengan SMOOTH TRANSITION --- */
        #story-container { 
            display: none; position: fixed; inset: 0; z-index: 200; 
            background: rgba(255,245,247,0.98); backdrop-filter: blur(25px);
        }
        .slide { 
            display: none; flex-direction: column; align-items: center; text-align: center; 
            opacity: 0; transform: translateY(100px) scale(0.8);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .slide.active {
            opacity: 1; transform: translateY(0) scale(1);
        }
        .slide.leaving {
            opacity: 0; transform: translateY(-50px) scale(0.9);
        }
        .frame-foto { 
            width: 300px; height: 380px; background: linear-gradient(45deg, white, #fff8fb);
            padding: 15px; border-radius: 25px; box-shadow: var(--glow-pink), 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(0); transition: all 0.8s ease-out;
        }
        .slide.active .frame-foto { transform: scale(1) rotateY(0deg); }
        .frame-foto img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255,20,147,0.3);
        }
        .teks-story { 
            margin-top: 30px; font-size: 1.4rem; color: var(--pink-tua); 
            font-weight: 700; padding: 0 40px; font-family: 'Pacifico', cursive;
            text-shadow: 0 2px 10px rgba(255,20,147,0.3);
            opacity: 0; transform: translateY(30px);
            transition: all 0.8s ease-out 0.3s;
        }
        .slide.active .teks-story { opacity: 1; transform: translateY(0); }
        
        .btn-next { 
            margin-top: 40px; background: linear-gradient(45deg, var(--pink-tua), var(--pink-muda));
            color: white; border: none; padding: 15px 35px; border-radius: 30px; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer; font-family: 'Quicksand', sans-serif;
            box-shadow: var(--glow-pink); transform: scale(0);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .slide.active .btn-next { transform: scale(1); }
        .btn-next:hover { transform: scale(1.1); box-shadow: 0 20px 40px rgba(255,20,147,0.6); }

        /* --- SURAT dengan TYPEWRITER SMOOTH --- */
        #konten-pesan {
            display: none; position: fixed; inset: 0; z-index: 300; 
            background: rgba(255,245,247,0.95); backdrop-filter: blur(30px);
        }
        .kotak-surat { 
            background: linear-gradient(135deg, white, #fff8fb); 
            padding: 35px; border-radius: 30px; border: 4px solid var(--pink-muda);
            max-width: 420px; text-align: center; max-height: 75vh; overflow-y: auto;
            box-shadow: var(--glow-pink), 0 30px 70px rgba(0,0,0,0.15);
            transform: scale(0.7) rotateX(30deg); opacity: 0;
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #konten-pesan.active .kotak-surat { 
            transform: scale(1) rotateX(0deg); opacity: 1; 
        }
        #teks-ngetik { 
            line-height: 1.7; color: #333; font-size: 1rem; text-align: left; 
            white-space: pre-line; padding: 20px; background: rgba(255,255,255,0.5);
            border-radius: 15px; border-left: 5px solid var(--pink-tua);
        }

        /* Music Button */
        #music-toggle { 
            position: fixed; top: 25px; right: 25px; z-index: 4000; 
            background: rgba(255,255,255,0.95); border-radius: 50%; width: 55px; height: 55px;
            display: flex; justify-content: center; align-items: center; border: 3px solid var(--pink-muda);
            cursor: pointer; font-size: 1.4rem; box-shadow: var(--glow-pink);
            transition: all 0.3s;
        }
        #music-toggle:hover { transform: scale(1.2) rotate(180deg); }
    </style>
</head>
